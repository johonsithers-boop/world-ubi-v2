name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: 0123456789abcdef0123456789abcdef0123456789abcde
      NEXT_PUBLIC_CHAIN: sepolia
      NEXT_PUBLIC_BASIC_INCOME_CONTRACT: 0x0000000000000000000000000000000000000001
      NEXT_PUBLIC_STAKING_CONTRACT: 0x0000000000000000000000000000000000000002
      DATABASE_PATH: /tmp/votes.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Type check
        run: npm run typecheck
